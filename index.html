    {id:"conv_inet_hug", col:"Conv_Internet_HUG", label:"Internet on HUG", unit:"%"}
  ]},
  {id:"xsell",title:"X-sell coaching (warranty, acc, BRSB)",criteria:[
    {id:"xsell_gp",label:"Game Plan utilisation reviewed in-store",sub:"Warranty, accessories, BRSB coverage assessed"},
    {id:"xsell_reh",label:"Objection scenarios rehearsed",sub:"Role-play conducted - not just discussed"},
    {id:"xsell_mgr",label:"Manager coached to run session independently",sub:"Goal: manager leads daily, not RSM"},
    {id:"xsell_inv",label:"Invoice verifications done with follow-up",sub:"Clear actions logged on missed opportunities"}
  ]},
  {id:"acct",title:"Manager accountability & target setting",criteria:[
    {id:"acc_1on1",label:"1:1 conducted - metrics-first",sub:"Manager presents their numbers before RSM input"},
    {id:"acc_tgt",label:"Targets set with specific $ / % and deadline",sub:"No vague direction - numbers and dates required"},
    {id:"acc_wrt",label:"Written commitment captured",sub:"One documented commitment minimum"},
    {id:"acc_rev",label:"Prior commitment reviewed at start",sub:"Impact measured - holds manager accountable"}
  ], inputs:[
    {id:"acct_set_target",    col:"Acct_Set_Target",          label:"Set target",                    placeholder:"e.g. 45% AGA conversion, $12k GM by EOM"},
    {id:"acct_written_commit",col:"Acct_Written_Commitment",  label:"Written commitment from Manager", placeholder:"Exact commitment as stated by the manager"}
  ]},
  {id:"tasks",title:"Manager tasks & execution standard",criteria:[
    {id:"tasks_rev",label:"Store Manager task list reviewed",sub:"Development-focused - not just auditing completion"},
    {id:"tasks_act",label:"Clear actions assigned on missed tasks",sub:"Gaps addressed with coaching, not just acknowledgement"},
    {id:"tasks_cad",label:"Structured review cadence maintained",sub:"Consistent timing - not ad hoc"}
  ]}
];

var state = {};
for (var i=0; i<CATS.length; i++) {
  var cat = CATS[i];
  for (var j=0; j<cat.criteria.length; j++) {
    state[cat.criteria[j].id] = "na";
  }
  state["note_"+cat.id] = "";
}

function setToday() {
  var d = new Date();
  var mm = String(d.getMonth()+1).padStart(2,"0");
  var dd = String(d.getDate()).padStart(2,"0");
  document.getElementById("visitdt").value = d.getFullYear()+"-"+mm+"-"+dd;
}

function setStatus(id,val){
  state[id]=val;
  ["done","part","miss"].forEach(function(s){var b=document.getElementById("tb_"+id+"_"+s);if(b)b.className="tbtn"+(val===s?" t"+s:"");});
  var rw=document.getElementById("rw_"+id);
  if(rw){if(val==="part"||val==="miss"){rw.className="reason-wrap show "+(val==="miss"?"miss-r":"part-r");var rta=document.getElementById("rt_"+id);if(rta)rta.placeholder=val==="miss"?"Why was this missed?":"What was only partially completed?";}else{rw.className="reason-wrap";var rta=document.getElementById("rt_"+id);if(rta){rta.value="";state["r_"+id]="";rta.className="reason-ta";}}}
  updateSummary();updateBadges();
}

function updateSummary() {
  var done=0, part=0, miss=0, na=0;
  for (var i=0; i<CATS.length; i++) {
    var cat = CATS[i];
    for (var j=0; j<cat.criteria.length; j++) {
      var v = state[cat.criteria[j].id];
      if (v==="done") done++;
      else if (v==="part") part++;
      else if (v==="miss") miss++;
      else na++;
    }
  }
  var logged = done+part+miss;
  var pct = logged>0 ? Math.round((done+part*0.5)/logged*100) : null;
  document.getElementById("sdone").textContent = done;
  document.getElementById("spart").textContent = part;
  document.getElementById("smiss").textContent = miss;
  document.getElementById("sna").textContent = na;
  var el = document.getElementById("sscore");
  if (pct===null) { el.textContent="-"; el.className="mval"; }
  else { el.textContent=pct+"%"; el.className="mval "+(pct>=80?"mg":pct>=50?"ma":"mr"); }
}

function catScore(cat) {
  var vals = [];
  for (var j=0; j<cat.criteria.length; j++) vals.push(state[cat.criteria[j].id]);
  var logged = 0, pts = 0;
  for (var k=0; k<vals.length; k++) {
    if (vals[k]!=="na") { logged++; if(vals[k]==="done") pts+=1; else if(vals[k]==="part") pts+=0.5; }
  }
  if (!logged) return {label:"Not started",cls:"bn",pct:0};
  var pct = Math.round(pts/logged*100);
  if (pct===100) return {label:"Complete",cls:"bg",pct:100};
  if (pct>=50) return {label:"Partial - "+pct+"%",cls:"ba",pct:pct};
  return {label:"Needs attention - "+pct+"%",cls:"br",pct:pct};
}

function catPct(cat) { return catScore(cat).pct; }

function updateBadges() {
  for (var i=0; i<CATS.length; i++) {
    var cat = CATS[i];
    var sc = catScore(cat);
    var b = document.getElementById("badge_"+cat.id);
    if (b) { b.textContent=sc.label; b.className="badge "+sc.cls; }
    var bar = document.getElementById("bar_"+cat.id);
    if (bar) { bar.style.width=sc.pct+"%"; bar.style.background=sc.pct>=100?"#3B6D11":sc.pct>=50?"#EF9F27":"#E24B4A"; }
  }
}

function toggleBody(bodyId, chevId) {
  var b = document.getElementById(bodyId);
  var c = document.getElementById(chevId);
  if (!b || !c) return;
  var isOpen = b.style.display !== "none";
  b.style.display = isOpen ? "none" : "";
  c.className = "chev" + (isOpen ? "" : " open");
}

function render() {
  var wrap = document.getElementById("catwrap");
  if (!wrap) return;
  wrap.innerHTML = "";
  for (var i=0; i<CATS.length; i++) {
    var cat = CATS[i];
    var sc = catScore(cat);
    var catDiv = document.createElement("div");
    catDiv.className = "cat";
    var head = document.createElement("div");
    head.className = "cathead";
    head.setAttribute("onclick","toggleBody('cbody_"+cat.id+"','chev_"+cat.id+"')");
    head.innerHTML = "<span class='catico'>&#9656;</span>"
      + "<span class='cattitle'>"+cat.title+"</span>"
      + "<span class='badge "+sc.cls+"' id='badge_"+cat.id+"'>"+sc.label+"</span>"
      + "<span class='chev open' id='chev_"+cat.id+"'>&#8964;</span>";
    var body = document.createElement("div");
    body.className = "catbody";
    body.id = "cbody_"+cat.id;
    for (var j=0; j<cat.criteria.length; j++) {
      var c = cat.criteria[j];
      var row = document.createElement("div");
      row.className = "crit";
      row.innerHTML = "<div class='ctxt'><div class='clb'>"+c.label+"</div><div class='csub'>"+c.sub+"</div></div>"
        +"<div class='togs'>"
        +"<button class='tbtn' id='tb_"+c.id+"_done' onclick=\"setStatus('"+c.id+"','done')\">Done</button>"
        +"<button class='tbtn' id='tb_"+c.id+"_part' onclick=\"setStatus('"+c.id+"','part')\">Partial</button>"
        +"<button class='tbtn' id='tb_"+c.id+"_miss' onclick=\"setStatus('"+c.id+"','miss')\">Missed</button>"
        +"</div>";
      body.appendChild(row);
      var rwd=document.createElement("div");rwd.className="reason-wrap";rwd.id="rw_"+c.id;
      rwd.innerHTML="<div class='reason-lbl'>Reason *</div><textarea class='reason-ta' id='rt_"+c.id+"' rows='2' placeholder='Why was this missed?' oninput=\"state['r_"+c.id+"']=this.value;this.className='reason-ta';\"></textarea>";
      body.appendChild(rwd);
    }
    var ta = document.createElement("textarea");
    ta.className = "nota";
    ta.id = "note_"+cat.id;
    ta.placeholder = "Coaching notes, observations, commitments logged...";
    ta.setAttribute("oninput","state['note_"+cat.id+"']=this.value");
    body.appendChild(ta);
    if (cat.metrics && cat.metrics.length) {
      var mg = document.createElement("div");
      mg.className = "metrics-grid";
      for (var m=0; m<cat.metrics.length; m++) {
        var met = cat.metrics[m];
        var mi = document.createElement("div");
        mi.className = "metric-inp";
        mi.innerHTML = "<label>"+met.label+"</label>"
          +"<input type='number' id='"+met.id+"' min='0' max='100' step='0.1' placeholder='-' oninput=\"state['"+met.id+"']=parseFloat(this.value)||0\">"
          +"<span class='munit'>"+met.unit+"</span>";
        mg.appendChild(mi);
      }
      body.appendChild(mg);
    }
    if (cat.inputs && cat.inputs.length) {
      var ci = document.createElement("div");
      ci.className = "cat-inputs";
      for (var n=0; n<cat.inputs.length; n++) {
        var inp = cat.inputs[n];
        var irow = document.createElement("div");
        irow.className = "cat-inp-row";
        irow.innerHTML = "<label>"+inp.label+"</label>"
          +"<textarea id='"+inp.id+"' placeholder='"+inp.placeholder+"' oninput=\"state['"+inp.id+"']=this.value\"></textarea>";
        ci.appendChild(irow);
      }
      body.appendChild(ci);
    }
    var pw = document.createElement("div");
    pw.className = "pwrap";
    var pf = document.createElement("div");
    pf.className = "pfill";
    pf.id = "bar_"+cat.id;
    pf.style.width = "0%";
    pw.appendChild(pf);
    body.appendChild(pw);
    catDiv.appendChild(head);
    catDiv.appendChild(body);
    wrap.appendChild(catDiv);
  }
  updateBadges();
}

function overallPct() {
  var vals=[];
  for(var i=0;i<CATS.length;i++) for(var j=0;j<CATS[i].criteria.length;j++) vals.push(state[CATS[i].criteria[j].id]);
  var done=0,part=0,miss=0;
  for(var k=0;k<vals.length;k++){if(vals[k]==="done")done++;else if(vals[k]==="part")part++;else if(vals[k]==="miss")miss++;}
  var logged=done+part+miss;
  return logged>0?Math.round((done+part*0.5)/logged*100):0;
}

function buildMissedList() {
  var gaps=[];
  for(var i=0;i<CATS.length;i++) for(var j=0;j<CATS[i].criteria.length;j++) if(state[CATS[i].criteria[j].id]==="miss") gaps.push(CATS[i].criteria[j].label);
  return gaps.join("; ");
}

function showSpBar(msg,type) {
  var bar=document.getElementById("spbar");
  bar.textContent=msg;
  bar.className="spbar "+type;
  bar.style.display="block";
  bar.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function submitToSharePoint() {
  var rsm=document.getElementById("rsmsel").value;
  var store=document.getElementById("storeinp").value.trim();
  var date=document.getElementById("visitdt").value;
  if(!store){showSpBar("Store name is required.","err");return;}
  if(!date){showSpBar("Visit date is required.","err");return;}
  var ul=[];for(var i=0;i<CATS.length;i++)for(var j=0;j<CATS[i].criteria.length;j++)if(state[CATS[i].criteria[j].id]==="na")ul.push(CATS[i].criteria[j].label);
  if(ul.length){showSpBar("All criteria must be marked. "+ul.length+" item(s) not yet logged.","err");return;}
  var mr=[];for(var i=0;i<CATS.length;i++)for(var j=0;j<CATS[i].criteria.length;j++){var c=CATS[i].criteria[j];if(state[c.id]==="part"||state[c.id]==="miss"){var rt=document.getElementById("rt_"+c.id);if(!rt||!rt.value.trim()){mr.push(c.id);if(rt)rt.className="reason-ta err";}}}
  if(mr.length){showSpBar("Reason required for all Partial/Missed items. "+mr.length+" missing.","err");return;}
  var pct=overallPct();
  var grade=pct>=85?"On track":pct>=60?"Monitor - follow-up required":"Below standard - intervention required";
  var payload={
    RSM_District:rsm,
    Store_Visited:store,
    Visit_Date:date,
    Overall_Score:pct,
    Floor_Score:catPct(CATS[0]),
    Conversion_Score:catPct(CATS[1]),
    XSell_Score:catPct(CATS[2]),
    Accountability_Score:catPct(CATS[3]),
    Tasks_Score:catPct(CATS[4]),
    Assessment:grade,
    Missed_Items:buildMissedList(),
    Notes_Floor:(document.getElementById("note_"+CATS[0].id)||{}).value||"",
    Notes_Conversion:(document.getElementById("note_"+CATS[1].id)||{}).value||"",
    Notes_XSell:(document.getElementById("note_"+CATS[2].id)||{}).value||"",
    Notes_Accountability:(document.getElementById("note_"+CATS[3].id)||{}).value||"",
    Notes_Tasks:(document.getElementById("note_"+CATS[4].id)||{}).value||"",
    Conv_AGA:state["conv_aga"]||0,
    Conv_BRS:state["conv_brs"]||0,
    Conv_TV_Attach:state["conv_tv"]||0,
    Conv_Internet_AGA:state["conv_inet_aga"]||0,
    Conv_Internet_HUG:state["conv_inet_hug"]||0,
    Acct_Set_Target:state["acct_set_target"]||"",
    Acct_Written_Commitment:state["acct_written_commit"]||"",
    Store_Manager_Email:document.getElementById("storeEmail").value||""
  };
  var btn=document.getElementById("spbtn");
  btn.disabled=true;
  showSpBar("Submitting to SharePoint...","sending");
  fetch(PA_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
  .then(function(res){
    if(res.ok||res.status===202){showSpBar("Submitted successfully. Row created in RSM Compliance Tracker on VP Retail.","ok");}
    else{showSpBar("Submission failed (status "+res.status+"). Check your Power Automate flow.","err");}
    btn.disabled=false;
  })
  .catch(function(err){showSpBar("Network error: "+err.message,"err");btn.disabled=false;});
}

function fmtDate(d) {
  try { var p=d.split("-"); return p[2]+"/"+p[1]+"/"+p[0]; } catch(e) { return d; }
}

function statusLabel(s) {
  if (s==="done") return "Complete";
  if (s==="part") return "Partial";
  if (s==="miss") return "Missed";
  return "Not logged";
}

function genReport() {
  var rsm=document.getElementById("rsmsel").value;
  var store=document.getElementById("storeinp").value.trim()||"Not specified";
  var date=document.getElementById("visitdt").value||"Date not specified";
  var done=0,part=0,miss=0,total=0;
  for(var i=0;i<CATS.length;i++) for(var j=0;j<CATS[i].criteria.length;j++){total++;var v=state[CATS[i].criteria[j].id];if(v==="done")done++;else if(v==="part")part++;else if(v==="miss")miss++;}
  var logged=done+part+miss;
  var pct=logged>0?Math.round((done+part*0.5)/logged*100):0;
  var grade=pct>=85?"On track - no immediate action required":pct>=60?"Monitor - follow-up required before next visit":"Below standard - intervention required";
  var line="------------------------------------------------";
  var lines=["CELLCOM COMMUNICATIONS","RSM DAILY COMPLIANCE REPORT",line,"RSM / District  : "+rsm,"Store visited   : "+store,"Date of visit   : "+fmtDate(date),"Overall score   : "+pct+"%","Breakdown       : "+done+" complete / "+part+" partial / "+miss+" missed / "+(total-logged)+" not logged",""];
  for(var i=0;i<CATS.length;i++){
    var cat=CATS[i];var sc=catScore(cat);
    lines.push(">> "+cat.title.toUpperCase());
    lines.push("   Status: "+sc.label);
    for(var j=0;j<cat.criteria.length;j++){var c=cat.criteria[j];var rt5=document.getElementById("rt_"+c.id);var rs5=rt5&&rt5.value.trim()?" — "+rt5.value.trim():"";lines.push("   - "+c.label+": "+statusLabel(state[c.id])+rs5);}
    if(cat.metrics&&cat.metrics.length){lines.push("   Conversion rates:");for(var m=0;m<cat.metrics.length;m++){var mv=state[cat.metrics[m].id];lines.push("     "+cat.metrics[m].label+": "+(mv||0)+cat.metrics[m].unit);}}
    if(cat.inputs&&cat.inputs.length){for(var n=0;n<cat.inputs.length;n++){var iv=state[cat.inputs[n].id];if(iv)lines.push("   "+cat.inputs[n].label+": "+iv);}}
    var noteEl=document.getElementById("note_"+cat.id);var noteVal=noteEl?noteEl.value.trim():"";
    if(noteVal)lines.push("   Notes: "+noteVal);
    lines.push("");
  }
  lines.push(line);
  var gaps=[];
  for(var i=0;i<CATS.length;i++) for(var j=0;j<CATS[i].criteria.length;j++) if(state[CATS[i].criteria[j].id]==="miss") gaps.push({cat:CATS[i].title,crit:CATS[i].criteria[j].label});
  if(gaps.length){lines.push("PRIORITY GAPS:");var lastCat="";for(var g=0;g<gaps.length;g++){if(gaps[g].cat!==lastCat){lines.push("  "+gaps[g].cat);lastCat=gaps[g].cat;}lines.push("  -> "+gaps[g].crit);}lines.push("");}
  lines.push("ASSESSMENT: "+grade);
  var report=lines.join("\n");
  document.getElementById("repbox").textContent=report;
  document.getElementById("repsec").style.display="block";
  document.getElementById("repsec").scrollIntoView({behavior:"smooth",block:"start"});
}

function copyRep(){var t=document.getElementById("repbox").textContent;if(!t)genReport();navigator.clipboard.writeText(document.getElementById("repbox").textContent).then(function(){showToast("Report copied!");});}

function shareIt(){
  var data={rsm:document.getElementById("rsmsel").value,store:document.getElementById("storeinp").value,date:document.getElementById("visitdt").value,s:{}};
  for(var i=0;i<CATS.length;i++){var cat=CATS[i];for(var j=0;j<cat.criteria.length;j++)data.s[cat.criteria[j].id]=state[cat.criteria[j].id];data.s["note_"+cat.id]=state["note_"+cat.id]||"";
  if(cat.metrics)for(var m=0;m<cat.metrics.length;m++)data.s[cat.metrics[m].id]=state[cat.metrics[m].id]||0;
  if(cat.inputs)for(var n=0;n<cat.inputs.length;n++)data.s[cat.inputs[n].id]=state[cat.inputs[n].id]||"";
  }
  var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  var url=window.location.origin+window.location.pathname+"?d="+encoded;
  document.getElementById("shareurl").textContent=url;
  var bar=document.getElementById("sharebar");bar.style.display="flex";
  bar.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function copyUrl(){navigator.clipboard.writeText(document.getElementById("shareurl").textContent).then(function(){showToast("Link copied!");});}

function loadFromUrl(){
  var params=new URLSearchParams(window.location.search);var d=params.get("d");if(!d)return;
  try{
    var data=JSON.parse(decodeURIComponent(escape(atob(d))));
    if(data.rsm)document.getElementById("rsmsel").value=data.rsm;
    if(data.store)document.getElementById("storeinp").value=data.store;
    if(data.date)document.getElementById("visitdt").value=data.date;
    if(data.s){for(var k in data.s){if(data.s.hasOwnProperty(k))state[k]=data.s[k];}for(var i=0;i<CATS.length;i++){var cat=CATS[i];for(var j=0;j<cat.criteria.length;j++){var cid=cat.criteria[j].id;var val=state[cid];if(val&&val!=="na"){var btn=document.getElementById("tb_"+cid+"_"+val);if(btn)btn.className="tbtn t"+val;}}var noteEl=document.getElementById("note_"+cat.id);if(noteEl)noteEl.value=state["note_"+cat.id]||"";
    if(cat.metrics)for(var m=0;m<cat.metrics.length;m++){var mel=document.getElementById(cat.metrics[m].id);if(mel&&state[cat.metrics[m].id])mel.value=state[cat.metrics[m].id];}
    if(cat.inputs)for(var n=0;n<cat.inputs.length;n++){var iel=document.getElementById(cat.inputs[n].id);if(iel&&state[cat.inputs[n].id])iel.value=state[cat.inputs[n].id];}
    }}
    updateSummary();updateBadges();
  }catch(e){console.warn("load error",e);}
}

function resetAll(){
  for(var i=0;i<CATS.length;i++){var cat=CATS[i];for(var j=0;j<cat.criteria.length;j++){var cid=cat.criteria[j].id;state[cid]="na";var statuses=["done","part","miss"];for(var s=0;s<statuses.length;s++){var b=document.getElementById("tb_"+cid+"_"+statuses[s]);if(b)b.className="tbtn";}}
  state["r_"+cid]="";var rw6=document.getElementById("rw_"+cid);if(rw6)rw6.className="reason-wrap";var rt6=document.getElementById("rt_"+cid);if(rt6){rt6.value="";rt6.className="reason-ta";}
  state["note_"+cat.id]="";var n=document.getElementById("note_"+cat.id);if(n)n.value="";
  if(cat.metrics)for(var m=0;m<cat.metrics.length;m++){state[cat.metrics[m].id]=0;var mel=document.getElementById(cat.metrics[m].id);if(mel)mel.value="";}
  if(cat.inputs)for(var ni=0;ni<cat.inputs.length;ni++){state[cat.inputs[ni].id]="";var iel=document.getElementById(cat.inputs[ni].id);if(iel)iel.value="";}
  }
  document.getElementById("repsec").style.display="none";
  document.getElementById("sharebar").style.display="none";
  var spb=document.getElementById("spbar");if(spb)spb.style.display="none";
  history.replaceState(null,"",window.location.pathname);
  updateSummary();updateBadges();
}

function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2200);}

setToday();
render();
loadFromUrl();
updateSummary();
</script>
